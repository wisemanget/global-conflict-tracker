name: Refresh Data

on:
  schedule:
    # Runs every 6 hours so the published dataset stays reasonably fresh.
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh conflict data from live sources
        run: node scripts/refreshConflictData.mjs

      - name: Archive snapshot
        run: node scripts/archiveSnapshot.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/conflict_data.json public/history_snapshots.json
          git diff --quiet --cached || git commit -m "chore: refresh live conflict data [skip ci]"
          git push
